<main>
  <section>
    <h2>Add New Course</h2>

    <form>
      <label>Course Name:</label><br>
      <input type="text" placeholder="Enter course name" required><br><br>

      <label>Instructor:</label><br>
      <input type="text" placeholder="Enter instructor name" required><br><br>

      <label>Credit Hours:</label><br>
      <input type="number" min="1" max="6" required><br><br>

      <label>Notes:</label><br>
      <textarea placeholder="Any notes..."></textarea><br><br>

      <button type="submit">Add Course</button>
    </form>

  </section>
</main>
